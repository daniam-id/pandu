<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#085427" />
    <meta name="description" content="Pandu.ai — Real-time AI Dispatcher Dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Pandu.ai — Dispatcher Dashboard</title>
  </head>
  <body>
    <div id="root">
      <div style="padding:24px;font-family:sans-serif;text-align:center;color:#333;">
        <h1 style="margin:0 0 8px 0;font-size:18px;">Pandu.ai Dashboard</h1>
        <p style="margin:0;font-size:14px;color:#666;">Loading application...</p>
        <p id="error-msg" style="display:none;margin-top:12px;padding:12px;background:#fee;color:#c00;font-family:monospace;font-size:12px;border-radius:4px;"></p>
      </div>
    </div>
    <script>
      (function() {
        var e = document.getElementById('error-msg');
        function show(msg) { e.style.display='block'; e.textContent += msg + '\n'; }
        window.onerror = function(m, s, l, c, err) { show('ERROR: ' + m + ' at ' + s + ':' + l); };
        window.onunhandledrejection = function(ev) { show('REJECTION: ' + (ev.reason && ev.reason.stack || ev.reason)); };
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0 && root.querySelector('h1')) {
            show('React did not mount within 5s — possible crash during module load or render.');
          }
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
