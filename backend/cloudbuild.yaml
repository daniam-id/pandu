steps:
  # Step 1: Type-check & lint
  - name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        cd backend
        npm ci
        npm run type-check
        npm run lint

  # Step 2: Deploy via --source (Cloud Build builds Dockerfile + pushes to Cloud Run)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pandu-backend
      - --source=.
      - --region=asia-southeast2
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production,LOG_LEVEL=info
      - --set-secrets=FIREBASE_PRIVATE_KEY=pandu-firebase-sa:latest,GEMINI_API_KEY=pandu-gemini:latest
